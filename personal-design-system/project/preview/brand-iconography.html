<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.wrap { display: flex; gap: 24px; align-items: center; }
.icons { display: flex; gap: 14px; color: var(--fg-1); }
.icons i { width: 22px; height: 22px; display:inline-block; }
.note { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); }
.sizes { display: flex; gap: 12px; align-items: flex-end; color: var(--fg-1); }
.s-item { display:flex; flex-direction:column; align-items:center; gap:4px; }
.s-item .lbl { font-family: var(--font-mono); font-size: 9px; color: var(--fg-3); }
</style></head><body><div class="card">
<div class="wrap">
  <div class="icons" id="ic"></div>
  <div style="width:1px;height:28px;background:var(--border)"></div>
  <div class="sizes" id="sz"></div>
</div>
<div class="note" style="margin-top:14px">Lucide · stroke 1.75 · currentColor · sizes 16 / 20 / 24 / 32</div>
<script src="https://unpkg.com/lucide@0.462.0/dist/umd/lucide.min.js"></script>
<script>
  const names = ['sparkle','feather','book-open','notebook-pen','compass','coffee','send','moon','leaf'];
  document.getElementById('ic').innerHTML = names.map(n=>`<i data-lucide="${n}" style="stroke-width:1.75"></i>`).join('');
  const sizes = [16,20,24,32];
  document.getElementById('sz').innerHTML = sizes.map(s=>`<div class="s-item"><i data-lucide="sparkle" style="width:${s}px;height:${s}px;stroke-width:1.75"></i><div class="lbl">${s}</div></div>`).join('');
  lucide.createIcons();
</script>
</div></body></html>
