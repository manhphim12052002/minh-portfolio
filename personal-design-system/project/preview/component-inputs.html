<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.stack { display: flex; flex-direction: column; gap: 10px; max-width: 420px; }
.field { display: flex; flex-direction: column; gap: 4px; }
.label { font-family: var(--font-sans); font-size: 12px; font-weight: 500; color: var(--fg-2); }
.input { font-family: var(--font-sans); font-size: 14px; padding: 10px 12px; border-radius: 8px; border: 1px solid var(--lumen-stone-200); background: var(--lumen-white); color: var(--fg-1); outline: none; transition: all 220ms cubic-bezier(0.2,0.8,0.2,1); }
.input:focus { border-color: var(--lumen-deep); box-shadow: 0 0 0 4px rgba(74,122,184,0.12); }
.input.focused { border-color: var(--lumen-deep); box-shadow: 0 0 0 4px rgba(74,122,184,0.12); }
.hint { font-family: var(--font-sans); font-size: 11px; color: var(--fg-3); }
.row { display:flex; gap:8px; }
.row .input { flex: 1; }
</style></head><body><div class="card">
<div class="stack">
  <div class="field">
    <div class="label">your name</div>
    <input class="input" value="jesse" />
  </div>
  <div class="field">
    <div class="label">email</div>
    <input class="input focused" value="hello@lumen.site" />
    <div class="hint">press <span style="font-family:var(--font-mono);background:var(--surface-soft);padding:1px 5px;border-radius:3px">enter</span> to subscribe</div>
  </div>
</div>
</div></body></html>
