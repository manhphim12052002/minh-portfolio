<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
table { width:100%; border-collapse: collapse; font-family: var(--font-sans); font-size: 13px; }
th { text-align:left; font-weight: 500; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-3); padding: 6px 10px; border-bottom: 1px solid var(--border); }
td { padding: 8px 10px; border-bottom: 1px solid var(--border); color: var(--fg-2); vertical-align: top; }
tr:last-child td { border-bottom: none; }
.do { color: var(--fg-1); }
.dont { color: var(--fg-3); text-decoration: line-through; text-decoration-color: var(--lumen-stone-300); }
</style></head><body><div class="card">
<table>
  <tr><th>Do</th><th>Don't</th></tr>
  <tr><td class="do">sentence case for headlines</td><td class="dont">Title Case For Headlines</td></tr>
  <tr><td class="do">lowercase nav labels (about, writing, now)</td><td class="dont">ABOUT · WRITING · NOW</td></tr>
  <tr><td class="do">"use, start, build, think"</td><td class="dont">"leverage, utilize, ideate"</td></tr>
  <tr><td class="do">em-dash — for asides — sparingly</td><td class="dont">semicolons; in every; sentence;</td></tr>
</table>
</div></body></html>
