<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.row { display:flex; align-items:center; gap:14px; padding:8px 0; }
.bar { background: var(--lumen-sky); height: 12px; border-radius: 3px; }
.tok { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); width: 100px; flex-shrink: 0; }
.px { font-family: var(--font-mono); font-size: 10px; color: var(--fg-2); }
</style></head><body><div class="card">
<div class="row"><div class="tok">--space-1</div><div class="bar" style="width:4px"></div><div class="px">4</div></div>
<div class="row"><div class="tok">--space-2</div><div class="bar" style="width:8px"></div><div class="px">8</div></div>
<div class="row"><div class="tok">--space-3</div><div class="bar" style="width:12px"></div><div class="px">12</div></div>
<div class="row"><div class="tok">--space-4</div><div class="bar" style="width:16px"></div><div class="px">16</div></div>
<div class="row"><div class="tok">--space-6</div><div class="bar" style="width:24px"></div><div class="px">24</div></div>
<div class="row"><div class="tok">--space-8</div><div class="bar" style="width:32px"></div><div class="px">32</div></div>
<div class="row"><div class="tok">--space-12</div><div class="bar" style="width:48px"></div><div class="px">48</div></div>
<div class="row"><div class="tok">--space-16</div><div class="bar" style="width:64px"></div><div class="px">64</div></div>
<div class="row"><div class="tok">--space-24</div><div class="bar" style="width:96px"></div><div class="px">96</div></div>
</div></body></html>
