<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.row { display:flex; gap:18px; align-items:flex-end; }
.item { display:flex; flex-direction:column; align-items:center; gap:8px; }
.shape { width: 80px; height: 56px; background: var(--lumen-sky); }
.tok { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); }
</style></head><body><div class="card">
<div class="row">
  <div class="item"><div class="shape" style="border-radius:4px"></div><div class="tok">xs · 4</div></div>
  <div class="item"><div class="shape" style="border-radius:8px"></div><div class="tok">sm · 8</div></div>
  <div class="item"><div class="shape" style="border-radius:12px"></div><div class="tok">md · 12</div></div>
  <div class="item"><div class="shape" style="border-radius:18px"></div><div class="tok">lg · 18</div></div>
  <div class="item"><div class="shape" style="border-radius:28px"></div><div class="tok">xl · 28</div></div>
  <div class="item"><div class="shape" style="width:56px;height:56px;border-radius:999px"></div><div class="tok">full</div></div>
</div>
</div></body></html>
