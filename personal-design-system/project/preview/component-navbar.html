<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.nav { background: rgba(255,255,255,0.72); backdrop-filter: blur(12px); border: 1px solid var(--border); border-radius: 14px; padding: 10px 14px; display: flex; align-items: center; gap: 18px; }
.brand { display: flex; align-items: center; gap: 8px; }
.mono-tile { width: 22px; height: 22px; border-radius: 6px; background: var(--lumen-ink); color: var(--lumen-mist); display:flex; align-items:center; justify-content:center; font-family: var(--font-serif); font-style: italic; font-size: 16px; line-height: 1; }
.brand-name { font-family: var(--font-serif); font-size: 16px; color: var(--fg-1); }
.links { display: flex; gap: 18px; margin-left: auto; }
.link { font-family: var(--font-sans); font-size: 13px; color: var(--fg-2); text-decoration: none; padding: 4px 6px; border-radius: 6px; transition: all 180ms; }
.link:hover { color: var(--fg-1); background: var(--accent-soft); }
.link.active { color: var(--fg-1); }
.link.active::after { content:''; display:block; height:2px; background: var(--lumen-ember); border-radius:2px; margin-top: 2px; }
</style></head><body><div class="card" style="background:var(--lumen-mist)">
<div class="nav">
  <div class="brand">
    <div class="mono-tile">l</div>
    <div class="brand-name">lumen</div>
  </div>
  <div class="links">
    <a class="link active">writing</a>
    <a class="link">work</a>
    <a class="link">about</a>
    <a class="link">now</a>
  </div>
</div>
</div></body></html>
