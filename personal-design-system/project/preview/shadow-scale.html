<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.row { display:flex; gap:24px; align-items:flex-end; padding: 20px 10px 10px; }
.item { display:flex; flex-direction:column; align-items:center; gap:10px; }
.box { width: 90px; height: 56px; background: var(--bg-raised); border-radius: 10px; }
.xs { box-shadow: 0 1px 2px rgba(30,58,95,0.06); }
.sm { box-shadow: 0 2px 8px rgba(30,58,95,0.06), 0 1px 2px rgba(30,58,95,0.04); }
.md { box-shadow: 0 8px 24px rgba(30,58,95,0.08), 0 2px 6px rgba(30,58,95,0.04); }
.lg { box-shadow: 0 24px 48px rgba(30,58,95,0.10), 0 4px 12px rgba(30,58,95,0.05); }
.tok { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); }
</style></head><body><div class="card" style="background:var(--lumen-mist)">
<div class="row">
  <div class="item"><div class="box xs"></div><div class="tok">xs</div></div>
  <div class="item"><div class="box sm"></div><div class="tok">sm</div></div>
  <div class="item"><div class="box md"></div><div class="tok">md</div></div>
  <div class="item"><div class="box lg"></div><div class="tok">lg</div></div>
</div>
</div></body></html>
