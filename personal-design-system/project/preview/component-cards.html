<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.grid { display:grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
.card2 { background: var(--bg-raised); border-radius: 12px; padding: 18px; box-shadow: 0 2px 8px rgba(30,58,95,0.06), 0 1px 2px rgba(30,58,95,0.04); transition: all 220ms cubic-bezier(0.2,0.8,0.2,1); }
.card2:hover { box-shadow: 0 8px 24px rgba(30,58,95,0.08); transform: translateY(-2px); }
.eyebrow { font-family: var(--font-sans); font-weight: 600; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--fg-2); }
.title { font-family: var(--font-sans); font-size: 20px; font-weight: 600; color: var(--fg-1); line-height: 1.25; letter-spacing: -0.02em; margin-top: 6px; }
.body { font-family: var(--font-sans); font-size: 13.5px; color: var(--fg-1); line-height: 1.55; margin-top: 8px; }
.meta { font-family: var(--font-mono); font-size: 10px; color: var(--fg-2); margin-top: 10px; font-weight: 500; }
</style></head><body><div class="card" style="background:var(--lumen-mist)">
<div class="grid">
  <div class="card2">
    <div class="eyebrow">APR 2026 · ESSAY</div>
    <div class="title">A small system for a quiet life online</div>
    <div class="body">On building tools that ask for less of your attention, not more.</div>
    <div class="meta">8 min read</div>
  </div>
  <div class="card2">
    <div class="eyebrow">MAR 2026 · NOTES</div>
    <div class="title">Three weeks into any metaphor</div>
    <div class="body">There's a moment when the image you chose at the start stops working.</div>
    <div class="meta">4 min read</div>
  </div>
</div>
</div></body></html>
