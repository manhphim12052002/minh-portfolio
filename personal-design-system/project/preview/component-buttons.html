<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.row { display:flex; gap:12px; align-items:center; flex-wrap: wrap; }
.btn { font-family: var(--font-sans); font-weight: 500; font-size: 14px; padding: 10px 18px; border-radius: 8px; border: 1px solid transparent; cursor: pointer; transition: all 220ms cubic-bezier(0.2,0.8,0.2,1); }
.primary { background: var(--lumen-ink); color: var(--lumen-mist); }
.primary:hover { background: var(--lumen-night); transform: translateY(-1px); box-shadow: 0 8px 24px rgba(30,58,95,0.14); }
.secondary { background: var(--lumen-white); color: var(--lumen-ink); border-color: var(--lumen-stone-200); }
.secondary:hover { background: var(--surface-soft); }
.ghost { background: transparent; color: var(--lumen-ink); }
.ghost:hover { background: var(--accent-soft); }
.accent { background: var(--lumen-ember); color: var(--lumen-ink); }
.accent:hover { filter: brightness(0.97); }
.small { font-size: 12px; padding: 6px 12px; border-radius: 6px; }
</style></head><body><div class="card">
<div class="row" style="margin-bottom:12px">
  <button class="btn primary">Read the post</button>
  <button class="btn secondary">Download CV</button>
  <button class="btn ghost">Cancel</button>
  <button class="btn accent">Subscribe</button>
</div>
<div class="row">
  <button class="btn primary small">save</button>
  <button class="btn secondary small">+ new note</button>
  <button class="btn ghost small">skip</button>
</div>
</div></body></html>
