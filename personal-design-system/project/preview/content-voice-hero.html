<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.example { background: var(--lumen-mist); border-radius: 12px; padding: 24px 28px; display:flex; flex-direction: column; gap: 10px; }
.eyebrow { font-family: var(--font-sans); font-weight: 600; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--fg-2); }
.title { font-family: var(--font-display); font-size: 28px; line-height: 1.1; color: var(--fg-1); letter-spacing: -0.03em; font-weight: 500; }
.lead { font-family: var(--font-sans); font-weight: 400; font-size: 15px; line-height: 1.5; color: var(--fg-2); letter-spacing: -0.005em; }
.p { font-family: var(--font-sans); font-size: 14px; line-height: 1.55; color: var(--fg-1); text-wrap: pretty; }
.p em { color: var(--fg-1); font-style: normal; font-weight: 600; background: linear-gradient(to top, var(--lumen-ember-soft) 40%, transparent 40%); padding: 0 2px; }
</style></head><body><div class="card">
<div class="example">
  <div class="eyebrow">VOICE · HERO</div>
  <div class="title">Building quiet tools with careful attention.</div>
  <div class="lead">I design and build small digital things &mdash; some ship, some don't.</div>
  <div class="p">Each one <em>teaches me something</em> about making the next one calmer. This site is where those lessons live.</div>
</div>
</div></body></html>
