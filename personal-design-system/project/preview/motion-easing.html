<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.row { display:grid; grid-template-columns: repeat(3, 1fr); gap:14px; }
.curve { background: var(--surface-soft); padding: 12px; border-radius: 10px; display:flex; flex-direction:column; gap:10px; height: 120px; }
.track { background: var(--lumen-stone-100); height: 3px; border-radius: 999px; position: relative; overflow: hidden; margin-top: auto; }
.ball { position: absolute; width: 16px; height: 16px; border-radius:999px; background: var(--lumen-deep); top: -6.5px; left: 0; animation: run 2.2s infinite; }
@keyframes run {
  0% { left: 0; }
  50% { left: calc(100% - 16px); }
  100% { left: 0; }
}
.tok { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); }
.name { font-family: var(--font-sans); font-size: 12px; font-weight: 500; color: var(--fg-1); }
.a { animation-timing-function: cubic-bezier(0.2, 0.8, 0.2, 1); }
.b { animation-timing-function: cubic-bezier(0.6, 0, 0.4, 1); }
.c { animation-timing-function: cubic-bezier(0.34, 1.56, 0.64, 1); }
</style></head><body><div class="card">
<div class="row">
  <div class="curve"><div class="name">ease-out</div><div class="tok">default · 220ms</div><div class="track"><div class="ball a"></div></div></div>
  <div class="curve"><div class="name">ease-in-out</div><div class="tok">transitions · 420ms</div><div class="track"><div class="ball b"></div></div></div>
  <div class="curve"><div class="name">spring</div><div class="tok">the "one moment"</div><div class="track"><div class="ball c"></div></div></div>
</div>
</div></body></html>
