<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.stack { display: grid; grid-template-columns: repeat(9, 1fr); gap: 6px; }
.sw { aspect-ratio: 1 / 1.2; border-radius: 8px; padding: 6px; display:flex;flex-direction:column;justify-content:flex-end; box-shadow: inset 0 0 0 1px rgba(30,58,95,0.03); }
.sw .n { font-family: var(--font-mono); font-size: 10px; line-height: 1; }
</style></head><body><div class="card">
<div class="stack">
  <div class="sw" style="background:#FBFBFC;color:#1E3A5F"><div class="n">paper</div></div>
  <div class="sw" style="background:#F5F6F8;color:#1E3A5F"><div class="n">50</div></div>
  <div class="sw" style="background:#E9ECF1;color:#1E3A5F"><div class="n">100</div></div>
  <div class="sw" style="background:#D4D9E1;color:#1E3A5F"><div class="n">200</div></div>
  <div class="sw" style="background:#B3BAC6;color:#1E3A5F"><div class="n">300</div></div>
  <div class="sw" style="background:#8992A2;color:#F4F7FB"><div class="n">400</div></div>
  <div class="sw" style="background:#5F6A7D;color:#F4F7FB"><div class="n">500</div></div>
  <div class="sw" style="background:#424C5E;color:#F4F7FB"><div class="n">600</div></div>
  <div class="sw" style="background:#2D3544;color:#F4F7FB"><div class="n">700</div></div>
</div>
</div></body></html>
