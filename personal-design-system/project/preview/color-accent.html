<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.row2 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
.sw { aspect-ratio: 2 / 1; border-radius: 10px; padding: 10px 12px; display: flex; flex-direction: column; justify-content: space-between; box-shadow: inset 0 0 0 1px rgba(30,58,95,0.04); }
.sw .n { font-family: var(--font-sans); font-size: 12px; font-weight: 500; }
.sw .h { font-family: var(--font-mono); font-size: 10px; opacity: 0.75; }
.note { font-family: var(--font-sans); font-size: 11px; color: var(--fg-3); margin-top: 14px; font-style: italic; }
</style></head><body><div class="card">
<div class="row2">
  <div class="sw" style="background:#E8B896;color:#1E3A5F"><div class="n">Ember</div><div class="h">E8B896</div></div>
  <div class="sw" style="background:#F5E4D6;color:#1E3A5F"><div class="n">Ember soft</div><div class="h">F5E4D6</div></div>
  <div class="sw" style="background:#FBFBFC;color:#1E3A5F;box-shadow:inset 0 0 0 1px #E9ECF1"><div class="n">Paper</div><div class="h">FBFBFC</div></div>
  <div class="sw" style="background:#1E3A5F;color:#F4F7FB"><div class="n">Ink (as black)</div><div class="h">1E3A5F</div></div>
</div>
<div class="note">Ember is a whisper — one element per view, max. Ink replaces true black.</div>
</div></body></html>
