<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"><style>
.row { display:flex; align-items:baseline; gap:18px; padding:10px 0; border-top: 1px solid var(--border); }
.row:first-child { border-top: none; }
.w { font-family: var(--font-mono); font-size: 10px; color: var(--fg-2); width: 96px; flex-shrink: 0; font-weight: 500; }
.s { font-family: var(--font-sans); color: var(--fg-1); font-size: 30px; line-height: 1.1; letter-spacing: -0.02em; }
.note { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); margin-top: 16px; }
</style></head><body><div class="card">
<div class="row"><div class="w">300 · Light</div><div class="s" style="font-weight:300">Satoshi, a calm measure</div></div>
<div class="row"><div class="w">400 · Regular</div><div class="s" style="font-weight:400">Satoshi, a calm measure</div></div>
<div class="row"><div class="w">500 · Medium</div><div class="s" style="font-weight:500">Satoshi, a calm measure</div></div>
<div class="row"><div class="w">700 · Bold</div><div class="s" style="font-weight:700">Satoshi, a calm measure</div></div>
<div class="row"><div class="w">900 · Black</div><div class="s" style="font-weight:900">Satoshi, a calm measure</div></div>
<div class="note">Self-hosted from /fonts — brand files. Italics exist (300/400/500/700/900) but are not used in the system.</div>
</div></body></html>
