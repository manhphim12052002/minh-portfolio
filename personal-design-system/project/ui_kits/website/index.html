<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>lumen — personal site</title>
<link rel="stylesheet" href="styles.css"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="Chrome.jsx"></script>
<script type="text/babel" src="Home.jsx"></script>
<script type="text/babel" src="Pages.jsx"></script>
<script type="text/babel">
function App() {
  const [route, setRoute] = React.useState(() => localStorage.getItem('lumen_route') || 'home');
  React.useEffect(() => { localStorage.setItem('lumen_route', route); window.scrollTo(0, 0); }, [route]);

  const page = { home: <Home setRoute={setRoute}/>, work: <Work/>, writing: <Writing/>, about: <About/> }[route];

  return (
    <div className="page" data-screen-label={`01 ${route}`}>
      <Nav route={route} setRoute={setRoute} />
      <main key={route}>{page}</main>
      <Footer/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
